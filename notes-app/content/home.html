<div class="home-content">
    <form id="noteForm" class="note-form">
        <input type="text" id="noteInput" class="note-input"
               placeholder="ваша заметка… например, «попробовать шу пуэр 2025»" autocomplete="off">
        <button type="submit" class="btn">🌱 записать</button>
    </form>

    <div class="notes-header">
        <span class="notes-title">📜 чайные заметки</span>
        <span class="notes-count" id="notesCount">0</span>
    </div>

    <ul id="notesList" class="notes-list"></ul>

    <div id="status" class="status">🕊️ готово</div>
</div>
