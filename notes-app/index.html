<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чайная лавка — тихие заметки</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#5b6b4f">

    <!-- Для iOS (Apple) -->
    <link rel="apple-touch-icon" href="/icons/favicon-256x256.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Чайные заметки">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64x64.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Georgia', serif;
            background: #eef2e6;
            min-height: 100vh;
            padding: 0;
        }

        /* App Shell стили */
        .app-shell {
            max-width: 720px;
            margin: 0 auto;
            background: #fefcf7;
            min-height: 100vh;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            padding: 32px 28px 20px 28px;
            border-bottom: 1px solid #e6e2d4;
            background: #fefcf7;
        }

        .tea-icon {
            font-size: 42px;
            margin-bottom: 8px;
            letter-spacing: 6px;
            opacity: 0.6;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            color: #3c4b3a;
            letter-spacing: -0.2px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #8f9a82;
            font-style: italic;
        }

        /* Навигация */
        .nav {
            display: flex;
            gap: 0;
            background: #fefcf7;
            border-bottom: 1px solid #e6e2d4;
            padding: 0 28px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px 20px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #8f9a82;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            border-bottom: 2px solid transparent;
        }

        .nav-btn.active {
            color: #5b6b4f;
            border-bottom-color: #5b6b4f;
        }

        .nav-btn:hover {
            color: #5b6b4f;
            background: #fbfaf5;
        }

        /* Основной контент */
        .main-content {
            padding: 28px;
            min-height: 60vh;
        }

        .install-badge {
            background: #d9e0cf;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #3b4a37;
            margin-top: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .install-badge:hover {
            background: #ccd4bd;
        }

        footer {
            text-align: center;
            padding: 20px 28px;
            font-size: 11px;
            color: #bcb6a4;
            border-top: 1px solid #ece6d8;
            background: #fefcf7;
        }

        /* Стили для форм и заметок (будут работать внутри динамического контента) */
        .note-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 36px;
            background: #fbfaf5;
            padding: 8px 4px;
            border-radius: 48px;
        }

        .note-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd8ca;
            border-radius: 48px;
            font-size: 15px;
            font-family: inherit;
            background: #ffffff;
            transition: all 0.2s ease;
            color: #2f3a2d;
        }

        .note-input:focus {
            outline: none;
            border-color: #b3c2a3;
            box-shadow: 0 0 0 2px rgba(128, 110, 83, 0.08);
        }

        .btn {
            padding: 10px 22px;
            background: #d9e0cf;
            border: none;
            border-radius: 48px;
            font-size: 14px;
            font-weight: 500;
            color: #3b4a37;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }

        .btn:hover {
            background: #ccd4bd;
            transform: translateY(-1px);
        }

        .notes-header {
            margin: 24px 0 14px 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px solid #ece7db;
            padding-bottom: 8px;
        }

        .notes-title {
            font-size: 16px;
            font-weight: 500;
            color: #5b6b4f;
        }

        .notes-count {
            font-size: 12px;
            color: #b3ad99;
        }

        .notes-list {
            list-style: none;
            margin-top: 8px;
        }

        .note-item {
            background: #ffffff;
            border: 1px solid #ece3d5;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .note-item:hover {
            border-color: #dad2bf;
            background: #fffef9;
        }

        .note-text {
            font-size: 15px;
            color: #414d3e;
            line-height: 1.45;
            word-break: break-word;
            padding-right: 12px;
        }

        .delete-btn {
            background: #f2efe7;
            border: none;
            font-size: 15px;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #9f937c;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #f1ede2;
            color: #b45a5a;
        }

        .empty-message {
            text-align: center;
            padding: 44px 20px;
            color: #b8b09b;
            font-style: italic;
            font-size: 14px;
            background: #fefcf7;
            border-radius: 44px;
        }

        .status {
            margin-top: 32px;
            padding: 12px 16px;
            border-radius: 44px;
            font-size: 12px;
            text-align: center;
            background: #f2f0ea;
            color: #6f7c64;
            border: 1px solid #e2ddd0;
        }

        .about-content {
            text-align: center;
            padding: 20px;
        }

        .about-content p {
            margin: 15px 0;
            color: #5b6b4f;
            line-height: 1.6;
        }

        @media (max-width: 520px) {
            .main-content {
                padding: 20px;
            }
            .nav {
                padding: 0 16px;
            }
            .note-form {
                flex-direction: column;
                border-radius: 28px;
                background: transparent;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="header">
            <div class="tea-icon">🍃🫖🍂</div>
            <h1>Чайная лавка</h1>
            <div class="subtitle">тихие заметки | пуэр и мысли</div>
            <div id="installBtn" class="install-badge" style="display: none;">📲 установить приложение</div>
        </div>

        <div class="nav">
            <button id="home-btn" class="nav-btn active">📜 Заметки</button>
            <button id="about-btn" class="nav-btn">🍃 О лавке</button>
        </div>

        <main id="app-content" class="main-content">
            <!-- Сюда будет загружаться динамический контент -->
            <div class="status">🕊️ загрузка…</div>
        </main>

        <footer>
            заметки хранятся только на этом устройстве<br>
            и доступны даже без подключения к сети
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
